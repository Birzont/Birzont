name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site artifact
        run: |
          mkdir -p _site
          cp index.html birzont-logo.png CNAME .nojekyll _site/
          cp -r css js fonts _site/
          for page in about.html blog.html career.html policy.html shortcut.html secret-hobby.html; do
            [ -f "$page" ] && cp "$page" _site/
          done
          for asset in styles.css tailwind.css app.js navbar.js footer.js theme.js team.js languageprovider.js secret-hobby.js; do
            [ -f "$asset" ] && cp "$asset" _site/
          done
          [ -d policy ] && cp -r policy _site/
          [ -d public ] && cp -r public _site/
          [ -d resources ] && cp -r resources _site/

      - name: Verify static site files
        run: |
          test -f _site/index.html
          test -f _site/css/landing.css
          test -f _site/js/landing.js
          test -f _site/birzont-logo.png
          test -f _site/.nojekyll
          test -f _site/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
